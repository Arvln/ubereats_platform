version: "3"

services:
  database:
    image: mysql:5.7
    platform: linux/amd64
    container_name: database
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ubereats_platform_local
    volumes:
      - ./docker/mysql/config/my.cnf:/etc/mysql/my.cnf
      - ./docker/mysql/data:/docker-entrypoint-initdb.d/
    expose:
      - "3306"
    restart: always
  database_tool:
    image: phpmyadmin
    container_name: database_tool
    environment:
      PMA_HOST: database
    ports:
      - "8081:80"
    depends_on:
      - database
    restart: always
  server:
    image: arvin1995/ubereats_platform:server-${TAG:-latest}
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: server
    environment:
      MYSQL_HOST: database
    depends_on:
      - database
    restart: always
  web:
    image: arvin1995/ubereats_platform:web-${TAG:-latest}
    build:
      context: .
      dockerfile: ./app/Dockerfile.dev
    container_name: web
    volumes:
      - ./app:/usr/src/app:cached
      - /usr/src/app/node_modules
      - /usr/src/app/.next
    depends_on:
      - server
    restart: always
  nginx:
    image: arvin1995/ubereats_platform:nginx-${TAG:-latest}
    build: ./docker/nginx
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/log:/var/log/nginx
    depends_on:
      - web
    restart: always
