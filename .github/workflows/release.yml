name: release

on:
  push:
    branches:
      - "release*"
  pull_request:
    branches:
      - "release*"

jobs:
  linting:
    name: Code Linting
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: app/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm i --frozen-lockfile
        working-directory: app
      - name: Run linting
        run: pnpm lint
        working-directory: app

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: app/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm i --frozen-lockfile
        working-directory: app
      - name: Run unit tests
        run: pnpm test
        working-directory: app

  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: [linting, unit-tests]
    if: github.event_name == 'push'
    outputs:
      TAG: ${{ steps.tag.outputs.TAG }}
      IMAGE: ${{ steps.tag.outputs.IMAGE }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate tag and image name
        id: tag
        run: |
          echo "TAG=dev-v1.0.$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./server/Dockerfile
          push: false
          tags: ${{ steps.tag.outputs.IMAGE }}:${{ steps.tag.outputs.TAG }}
          outputs: type=docker,dest=/tmp/image.tar
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar

  push:
    name: Push Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      TAG: ${{ needs.build.outputs.TAG }}
      IMAGE: ${{ needs.build.outputs.IMAGE }}
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp
      - name: Load image
        run: docker load --input /tmp/image.tar
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        run: docker push ${{ needs.build.outputs.IMAGE }}:${{ needs.build.outputs.TAG }}
      - name: Delete old images (keep latest 5)
        uses: actions/delete-package-versions@v5
        with:
          package-name: ubereats_platform
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: false

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: push
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Next.js to Vercel (preview)
        uses: amondnet/vercel-action@v25
        with:
          vercel-version: latest
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: app
      - name: Run DB init against Aiven
        run: |
          sudo apt-get update && sudo apt-get install -y default-mysql-client
          mysql -h ${{ secrets.AIVEN_HOST }} \
                -u ${{ secrets.AIVEN_USER }} \
                -p${{ secrets.AIVEN_PASSWORD }} \
                --ssl-mode=REQUIRED \
                ${{ secrets.AIVEN_DATABASE }} \
                < docker/mysql/data/data.sql
