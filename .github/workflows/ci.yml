name: ci

on:
  push:
    branches:
      - develop
      - "feature/*"
      - "bugfix/*"
  pull_request:
    branches:
      - develop

jobs:
  linting:
    name: Code Linting
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: app/package.json
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: app/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm i --frozen-lockfile
        working-directory: app
      - name: Run linting
        run: pnpm lint
        working-directory: app

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: app/package.json
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: app/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm i --frozen-lockfile
        working-directory: app
      - name: Run unit tests
        run: pnpm test
        working-directory: app

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [linting, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Prepare environment files
        run: |
          {
            echo "SERVER_PORT=${{ vars.SERVER_PORT }}"
            echo "MYSQL_HOST=${{ vars.MYSQL_HOST }}"
            echo "MYSQL_PORT=${{ vars.MYSQL_PORT }}"
            echo "MYSQL_USER=${{ vars.MYSQL_USER }}"
            echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}"
            echo "DATABASE_NAME=${{ vars.DATABASE_NAME }}"
          } > server/.env
          {
            echo "SERVER_URL=${{ vars.SERVER_URL }}"
            echo "SHORTCUT_ICONS_SERVER_HOST=${{ vars.SHORTCUT_ICONS_SERVER_HOST }}"
            echo "ADVERTISE_IMAGE_SERVER_HOST=${{ vars.ADVERTISE_IMAGE_SERVER_HOST }}"
            echo "CATEGORY_ICONS_SERVER_HOST=${{ vars.CATEGORY_ICONS_SERVER_HOST }}"
            echo "STORE_IMAGE_SERVER_HOST=${{ vars.STORE_IMAGE_SERVER_HOST }}"
            echo "UTILS_ICONS_SERVER_HOST=${{ vars.UTILS_ICONS_SERVER_HOST }}"
            echo "STAR_ICON_SERVER_HOST=${{ vars.STAR_ICON_SERVER_HOST }}"
            echo "SPICY_ICON_SERVER_HOST=${{ vars.SPICY_ICON_SERVER_HOST }}"
            echo "NODE_OPTIONS=${{ vars.NODE_OPTIONS }}"
          } > app/.env.local
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: app/package.json
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: app/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm i --frozen-lockfile
        working-directory: app
      - name: Build and start the stack
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
        run: |
          docker compose build --no-cache
          docker compose up -d
      - name: Wait for database
        run: |
          until docker exec database mysqladmin ping -uroot -p"${{ secrets.DB_ROOT_PASSWORD }}" --silent; do
            echo "waiting for database..."; sleep 2
          done
      - name: Wait for app via nginx
        run: |
          curl --retry 12 --retry-delay 5 --retry-connrefused -sf http://localhost
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
        working-directory: app
      - name: Run Playwright E2E
        run: pnpm test:e2e
        working-directory: app
      - name: Tear down
        if: always()
        run: docker compose down -v
