name: ci

on:
  push:
    branches:
      - develop
      - 'feature/*'
      - 'bugfix/*'
  pull_request:
    branches:
      - develop

jobs:
  linting:
    name: Code Linting
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm i --frozen-lockfile
        working-directory: app
      - name: Run linting
        run: pnpm lint
        working-directory: app

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm i --frozen-lockfile
        working-directory: app
      - name: Run unit tests
        run: pnpm test
        working-directory: app

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [linting, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm i --frozen-lockfile
        working-directory: app
      - name: Build and start the stack
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
        run: |
          docker compose build --no-cache
          docker compose up -d
      - name: Wait for database
        run: |
          until docker exec database mysqladmin ping -uroot -p"${{ secrets.DB_ROOT_PASSWORD }}" --silent; do
            echo "waiting for database..."; sleep 2
          done
      - name: Wait for app via nginx
        run: |
          curl --retry 12 --retry-delay 5 --retry-connrefused -sf http://localhost
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
        working-directory: app
      - name: Run Playwright E2E
        run: pnpm test:e2e
        working-directory: app
      - name: Tear down
        if: always()
        run: docker compose down -v
