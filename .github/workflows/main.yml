  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker
        uses: docker/setup-buildx-action@v2
      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose
      - name: Set up Docker Compose
        run: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

      - name: Run database connection test
        run: |
          sleep 10
          docker exec database mysql -uroot -pubereats_platform_local -e "SHOW DATABASES;" || exit 1
      - name: Run web service test
        run: |
          sleep 10  
          curl --silent --fail http://localhost:80 || exit 1
      - name: Run nginx test
        run: |
          sleep 10  
          curl --silent --fail http://localhost:80 || exit 1
        - name: Run integration test
          run: echo "Integration test passed!"
        - name: Tear down Docker Compose
          run: docker-compose down

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    # needs: [linting, unit-tests, integration-tests]
    needs: integration-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: Build Docker Image
        run: docker-compose build
      - name: Push Docker Image
        run: docker-compose push
